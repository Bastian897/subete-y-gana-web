/* ── Confetti ── */
function Confetti() {
  const pieces = React.useMemo(() => Array.from({length: 22}, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 6,
    dur: 5 + Math.random() * 5,
    color: ['#F5C842','#D4AF37','#FFF1B8','#FFFFFF','#B8860B','#FFE9A8'][Math.floor(Math.random()*6)],
    size: 5 + Math.random() * 6,
  })), []);

  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1}}>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left:`${p.left}%`,
          top:'-10px',
          width:p.size,
          height:p.size,
          background:p.color,
          animationDuration:`${p.dur}s`,
          animationDelay:`${p.delay}s`,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
        }}/>
      ))}
    </div>
  );
}

      backdropFilter:'blur(8px)',
      WebkitBackdropFilter:'blur(8px)',
      display:'flex',alignItems:'center',justifyContent:'center',
      padding:'var(--space-4)',
    }} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{
        background:'var(--bg-surface)',
        borderRadius:'var(--radius-lg)',
        border:'1px solid rgba(255,255,255,.1)',
        boxShadow:'var(--shadow-card)',
        width:'100%',maxWidth:480,
        position:'relative',
        overflow:'hidden',
      }}>
        {/* Gold top bar */}
        <div style={{height:3,background:'var(--grad-gold)'}}/>

        <div style={{padding:'var(--space-6)'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'var(--space-6)'}}>
            <h2 style={{fontFamily:'var(--font-display)',fontSize:'var(--fs-h3)',fontWeight:700,color:'var(--silver-100)'}}>
              {step==='success' ? '¡Participación confirmada!' : 'Comprar participaciones'}
            </h2>
            <button onClick={onClose} style={{
              background:'none',border:'none',color:'var(--silver-500)',
              fontSize:'1.25rem',cursor:'pointer',padding:4,lineHeight:1,
            }}>✕</button>
          </div>

          {step==='select' && (
            <>
              <ParticipationSelector onChange={setQty}/>
              <div style={{marginTop:'var(--space-6)'}}>
                <Button variant="primary" fullWidth size="lg" onClick={()=>setStep('confirm')}>
                  Continuar al pago
                </Button>
              </div>
            </>
          )}

          {step==='confirm' && (
            <div style={{display:'flex',flexDirection:'column',gap:'var(--space-4)'}}>
              <div style={{
                background:'var(--bg-elevated)',borderRadius:'var(--radius-md)',
                border:'1px solid rgba(255,255,255,.06)',padding:'var(--space-4)',
              }}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'var(--space-2)'}}>
                  <span style={{color:'var(--silver-500)',fontSize:'var(--fs-sm)'}}>Participaciones</span>
                  <span style={{color:'var(--silver-100)',fontWeight:600}}>{qty}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'var(--space-2)'}}>
                  <span style={{color:'var(--silver-500)',fontSize:'var(--fs-sm)'}}>Precio unitario</span>
                  <span style={{color:'var(--silver-100)',fontWeight:600}}>$3.000</span>
                </div>
                <div style={{height:1,background:'rgba(255,255,255,.06)',margin:'var(--space-3) 0'}}/>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'var(--silver-100)',fontWeight:700}}>Total</span>
                  <span style={{
                    fontWeight:800,fontSize:'1.25rem',
                    background:'var(--grad-gold)',WebkitBackgroundClip:'text',
                    WebkitTextFillColor:'transparent',backgroundClip:'text',
                    fontVariantNumeric:'tabular-nums',
                  }}>${(qty*3000).toLocaleString('es-CL')}</span>
                </div>
              </div>
              <div style={{
                padding:'var(--space-3)',
                background:'rgba(255,176,32,.08)',
                border:'1px solid rgba(255,176,32,.2)',
                borderRadius:'var(--radius-sm)',
                fontSize:'var(--fs-xs)',color:'var(--warning)',lineHeight:1.5,
              }}>
                Los correos pueden tardar unos minutos. Tu participación queda registrada inmediatamente.
              </div>
              <Button variant="primary" fullWidth size="lg" onClick={()=>setStep('success')}>
                Pagar con Webpay — ${(qty*3000).toLocaleString('es-CL')}
              </Button>
              <Button variant="ghost" fullWidth onClick={()=>setStep('select')}>Volver</Button>
            </div>
          )}

          {step==='success' && (
            <div style={{textAlign:'center',padding:'var(--space-6) 0'}}>
              <div style={{
                width:72,height:72,borderRadius:'50%',
                background:'rgba(52,199,89,.15)',border:'2px solid var(--success)',
                display:'flex',alignItems:'center',justifyContent:'center',
                margin:'0 auto var(--space-6)',fontSize:'2rem',
              }}>✓</div>
              <p style={{color:'var(--silver-300)',fontSize:'var(--fs-sm)',marginBottom:'var(--space-4)',lineHeight:'var(--lh-body)'}}>
                Tu participación ha sido registrada. Recibirás una confirmación por correo con tu número único.
              </p>
              <div style={{
                background:'var(--bg-elevated)',borderRadius:'var(--radius-md)',
                border:'1px solid rgba(255,255,255,.06)',padding:'var(--space-4)',
                marginBottom:'var(--space-6)',
              }}>
                <div style={{fontSize:'var(--fs-xs)',color:'var(--silver-500)',letterSpacing:'var(--ls-caps)',textTransform:'uppercase',marginBottom:4}}>Tu número de participación</div>
                <div style={{
                  fontFamily:'var(--font-mono)',fontSize:'2rem',fontWeight:700,
                  background:'var(--grad-gold)',WebkitBackgroundClip:'text',
                  WebkitTextFillColor:'transparent',backgroundClip:'text',
                  fontVariantNumeric:'tabular-nums',
                }}>#00{Math.floor(Math.random()*9000+1000)}</div>
              </div>
              <Button variant="primary" fullWidth onClick={onClose}>Cerrar</Button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── App root ── */
function App() {
  const [modalOpen, setModalOpen] = React.useState(false);
  return (
    <>
      <Header onBuy={()=>setModalOpen(true)}/>
      <main>
        <Hero onBuy={()=>setModalOpen(true)}/>
        <HowItWorks/>
        <ParticipationSection onBuy={()=>setModalOpen(true)}/>
        <PrizeSection/>
        <WallpapersSection/>
        <TrustSection/>
      </main>
      <Footer/>
      <PurchaseModal open={modalOpen} onClose={()=>setModalOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
