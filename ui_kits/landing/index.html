/* ── Scroll reveal hook ── */
function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('sr-in'); obs.disconnect(); }
    }, { threshold: 0.15 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

}

/* ── Confetti ── */
function Confetti() {
  const pieces = React.useMemo(() => Array.from({length: 22}, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 6,
    dur: 5 + Math.random() * 5,
    color: ['#F5C842','#D4AF37','#FFF1B8','#FFFFFF','#B8860B','#FFE9A8'][Math.floor(Math.random()*6)],
    size: 5 + Math.random() * 6,
  })), []);

  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1}}>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left:`${p.left}%`,
          top:'-10px',
          width:p.size,
          height:p.size,
          background:p.color,
          animationDuration:`${p.dur}s`,
          animationDelay:`${p.delay}s`,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
        }}/>
      ))}
    </div>
  );
}

function gameRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* Efectos de sonido sintetizados con WebAudio — sin archivos externos */
function gameCreateSfx() {
  let ctxA = null;
  function ctxOf() {
    if (!ctxA) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctxA = AC ? new AC() : null;
    }
    return ctxA;
  }
  function tone(freqStart, freqEnd, duration, type, gain) {
    const ac = ctxOf();
    if (!ac) return;
    try {
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freqStart, ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(Math.max(freqEnd, 1), ac.currentTime + duration);
      g.gain.setValueAtTime(gain, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
      osc.connect(g); g.connect(ac.destination);
      osc.start(); osc.stop(ac.currentTime + duration);
    } catch {}
  }
  return {
    jump: () => tone(340, 720, 0.14, 'triangle', 0.06),
    duck: () => tone(220, 140, 0.1, 'sine', 0.04),
    tick: () => tone(880, 880, 0.06, 'sine', 0.045),
    crash: () => {
      const ac = ctxOf();
      if (!ac) return;
      try {
        const bufferSize = Math.floor(ac.sampleRate * 0.25);
        const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        const noise = ac.createBufferSource();
        noise.buffer = buffer;
        const g = ac.createGain();
        g.gain.setValueAtTime(0.18, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
        noise.connect(g); g.connect(ac.destination);
        noise.start();
      } catch {}
    },
  };
}

/* Física y balance del runner */
const GROUND_RATIO = 0.76;
const GRAVITY = 2400;
const JUMP_VELOCITY = -800;
const DUCK_SCALE = 0.55;
const BASE_SPEED = 260;
const MAX_SPEED = 640;
const SPEED_RAMP = 5.5;
// Tiempo total que la camioneta pasa en el aire durante un salto (subida + bajada).
// El hueco entre obstáculos NUNCA puede ser menor a esto, o un salto no alcanza
// a completarse antes de que llegue el siguiente obstáculo (imposible de esquivar).
const JUMP_AIRTIME = (2 * Math.abs(JUMP_VELOCITY)) / GRAVITY;
const MIN_SPAWN_INTERVAL = JUMP_AIRTIME * 1.6; // margen de seguridad + tiempo de reacción

function GameCanvas({ onGameOver, driverImg }) {
  const canvasRef = React.useRef(null);
  const [hud, setHud] = React.useState({ score: 0 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const sfx = gameCreateSfx();

    let width = 0, height = 0;
    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas.parentElement);

    const truckH = () => height * 0.22;
    const truckW = () => height * 0.34;
    const truckXpos = () => width * 0.16;
    const groundY = () => height * GROUND_RATIO;

    let vy = 0;
    let airY = 0; // altura sobre el suelo (0 = en el suelo)
    let ducking = false;
    let jumping = false;
    let obstacles = []; // { x, w, type }
    let particles = []; // { x, y, vx, vy, life, maxLife, size }
    let bgFar = 0, bgMid = 0, bgGround = 0; // desplazamiento de parallax
    let spawnTimer = 0;
    let spawnInterval = 1.4;
    let gameSpeed = BASE_SPEED;
    let distance = 0;
    let score = 0;
    let elapsed = 0;
    let flashT = 0;
    let running = true;
    let last = performance.now();

    function doJump() {
      if (jumping || ducking) return;
      jumping = true;
      vy = JUMP_VELOCITY;
      sfx.jump();
    }
    function setDuck(v) {
      if (jumping) return;
      if (v && !ducking) sfx.duck();
      ducking = v;
    }

    function onKeyDown(e) {
      if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') { e.preventDefault(); doJump(); }
      else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') { e.preventDefault(); setDuck(true); }
    }
    function onKeyUp(e) {
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setDuck(false);
    }
    function onPointerDown(e) { e.preventDefault(); doJump(); }

    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    canvas.addEventListener('pointerdown', onPointerDown);

    function spawnObstacle() {
      const canFly = score > 120 && Math.random() < 0.3;
      if (canFly) {
        const bw = height * 0.30;
        obstacles.push({ x: width + bw, w: bw, type: 'sign' });
      } else if (Math.random() < 0.55) {
        const w = height * 0.11;
        obstacles.push({ x: width + w, w, type: 'cone' });
      } else {
        const w = height * 0.22;
        obstacles.push({ x: width + w, w, type: 'barrier' });
      }
    }

    function obstacleRect(o) {
      if (o.type === 'sign') {
        const standH = truckH();
        const top = groundY() - standH * 1.35;
        const bottom = groundY() - standH * 0.62;
        return { x: o.x - o.w / 2, y: top, w: o.w, h: bottom - top };
      }
      const oh = o.type === 'cone' ? height * 0.16 : height * 0.13;
      return { x: o.x - o.w / 2, y: groundY() - oh, w: o.w, h: oh };
    }

    function truckRect() {
      const w = truckW(), h = ducking ? truckH() * DUCK_SCALE : truckH();
      const x = truckXpos() - w / 2;
      const y = groundY() - airY - h;
      return { x, y, w, h };
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function lerpColor(c1, c2, t) {
      const a = c1.match(/\d+/g).map(Number), b = c2.match(/\d+/g).map(Number);
      return `rgb(${Math.round(a[0]+(b[0]-a[0])*t)},${Math.round(a[1]+(b[1]-a[1])*t)},${Math.round(a[2]+(b[2]-a[2])*t)})`;
    }

    function drawSky(t) {
      const topA = 'rgb(20,16,10)', topB = 'rgb(5,5,8)';
      const horA = 'rgb(120,86,30)', horB = 'rgb(40,32,18)';
      const grad = ctx.createLinearGradient(0, 0, 0, groundY());
      grad.addColorStop(0, lerpColor(topA, topB, t));
      grad.addColorStop(1, lerpColor(horA, horB, t));
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, width, groundY());
      const glow = ctx.createRadialGradient(width * 0.5, groundY(), 0, width * 0.5, groundY(), width * 0.5);
      glow.addColorStop(0, `rgba(245,200,66,${0.16 * (1 - t) + 0.05})`);
      glow.addColorStop(1, 'rgba(245,200,66,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, groundY());
    }

    function drawMountains(offset) {
      ctx.fillStyle = 'rgba(212,175,55,.10)';
      const baseY = groundY();
      const step = height * 0.9;
      const startX = -step + (-offset % step);
      ctx.beginPath();
      ctx.moveTo(startX, baseY);
      for (let x = startX; x < width + step; x += step) {
        ctx.lineTo(x + step * 0.5, baseY - height * 0.32);
        ctx.lineTo(x + step, baseY);
      }
      ctx.lineTo(width, baseY); ctx.lineTo(0, baseY);
      ctx.closePath();
      ctx.fill();
    }

    function drawSkyline(offset) {
      const baseY = groundY();
      const step = height * 0.42;
      const startX = -step + (-offset % step);
      for (let x = startX; x < width + step; x += step) {
        const bw = step * 0.5;
        const bh = height * (0.14 + 0.10 * Math.abs(Math.sin(x * 0.017)));
        ctx.fillStyle = 'rgba(20,20,24,.9)';
        ctx.fillRect(x, baseY - bh, bw, bh);
        ctx.fillStyle = 'rgba(245,200,66,.55)';
        ctx.fillRect(x + bw * 0.3, baseY - bh - 2, bw * 0.4, 2);
      }
    }

    function drawGround(offset) {
      const y = groundY();
      ctx.fillStyle = '#111114';
      ctx.fillRect(0, y, width, height - y);
      ctx.strokeStyle = 'rgba(212,175,55,.55)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.18)';
      const dashW = 30, gap = 26, step = dashW + gap;
      const startX = -step + (-offset % step);
      for (let x = startX; x < width; x += step) {
        ctx.fillRect(x, y + 10, dashW, 3);
      }
    }

    function drawParticle(p) {
      ctx.globalAlpha = Math.max(p.life / p.maxLife, 0);
      ctx.fillStyle = '#E2E4E8';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    function drawCone(x, y, w, h) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#D4AF37';
      ctx.strokeStyle = '#0A0A0B';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -h); ctx.lineTo(w / 2, 0); ctx.lineTo(-w / 2, 0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#0A0A0B';
      ctx.fillRect(-w / 2, -h * 0.42, w, h * 0.14);
      ctx.restore();
    }

    function drawBarrier(x, y, w, h) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = '#1C1C20';
      ctx.strokeStyle = '#FF453A';
      ctx.lineWidth = 2.5;
      gameRoundRect(ctx, -w / 2, 0, w, h, 5);
      ctx.fill(); ctx.stroke();
      ctx.save();
      ctx.beginPath(); gameRoundRect(ctx, -w / 2, 0, w, h, 5); ctx.clip();
      ctx.strokeStyle = 'rgba(212,175,55,.7)';
      ctx.lineWidth = 4;
      for (let i = -w; i < w; i += 9) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + h, h); ctx.stroke();
      }
      ctx.restore();
      ctx.restore();
    }

    function drawSign(x, w, top, bottom) {
      ctx.save();
      const postW = 4, h = bottom - top;
      ctx.fillStyle = '#0A0A0B';
      ctx.fillRect(x - w / 2, top - 6, postW, h + 12);
      ctx.fillRect(x + w / 2 - postW, top - 6, postW, h + 12);
      ctx.fillStyle = '#1C1C20';
      ctx.strokeStyle = '#FF453A';
      ctx.lineWidth = 2.5;
      gameRoundRect(ctx, x - w / 2, top, w, h, 6);
      ctx.fill(); ctx.stroke();
      ctx.save();
      ctx.beginPath(); gameRoundRect(ctx, x - w / 2, top, w, h, 6); ctx.clip();
      ctx.strokeStyle = 'rgba(212,175,55,.7)';
      ctx.lineWidth = 4;
      for (let i = -w; i < w; i += 9) {
        ctx.beginPath(); ctx.moveTo(x - w / 2 + i, top); ctx.lineTo(x - w / 2 + i + h, bottom); ctx.stroke();
      }
      ctx.restore();
      ctx.restore();
    }

    function drawTruck(rect, wheelSpin, bob) {
      const { x, y, w, h } = rect;
      const cx = x + w / 2, cy = y + h;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.fillStyle = 'rgba(0,0,0,.4)';
      ctx.beginPath(); ctx.ellipse(0, 4, w * 0.46, h * 0.12, 0, 0, Math.PI * 2); ctx.fill();

      ctx.translate(0, bob);
      ctx.fillStyle = '#1C1C20';
      ctx.strokeStyle = '#D4AF37';
      ctx.lineWidth = 2.5;
      gameRoundRect(ctx, -w / 2, -h * 0.55, w, h * 0.55, h * 0.14); ctx.fill(); ctx.stroke();

      const cabH = h * (ducking ? 0.42 : 0.62);
      ctx.fillStyle = '#141416';
      gameRoundRect(ctx, -w * 0.22, -h * 0.55 - cabH * 0.72, w * 0.5, cabH * 0.72, h * 0.1); ctx.fill(); ctx.stroke();

      const winX = -w * 0.16, winY = -h * 0.55 - cabH * 0.62, winW = w * 0.36, winH = cabH * 0.42;
      ctx.fillStyle = 'rgba(226,228,232,.35)';
      gameRoundRect(ctx, winX, winY, winW, winH, h * 0.04); ctx.fill();
      if (driverImg) {
        ctx.save();
        gameRoundRect(ctx, winX, winY, winW, winH, h * 0.04); ctx.clip();
        const size = Math.max(winW, winH) * 1.35;
        ctx.drawImage(driverImg, winX + winW / 2 - size / 2, winY + winH / 2 - size / 2, size, size);
        ctx.restore();
      }
      ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 1.5;
      gameRoundRect(ctx, winX, winY, winW, winH, h * 0.04); ctx.stroke();

      ctx.strokeStyle = '#F5C842';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-w / 2, -h * 0.22); ctx.lineTo(w / 2, -h * 0.22); ctx.stroke();

      const wheelR = h * 0.16;
      [-w * 0.3, w * 0.28].forEach((wx) => {
        ctx.save();
        ctx.translate(wx, 0);
        ctx.fillStyle = '#0A0A0B';
        ctx.beginPath(); ctx.arc(0, 0, wheelR, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#D4AF37'; ctx.lineWidth = 1.5;
        ctx.rotate(wheelSpin);
        for (let i = 0; i < 5; i++) {
          ctx.beginPath(); ctx.moveTo(0, 0);
          ctx.lineTo(Math.cos(i * Math.PI * 0.4) * wheelR * 0.8, Math.sin(i * Math.PI * 0.4) * wheelR * 0.8);
          ctx.stroke();
        }
        ctx.restore();
      });
      ctx.restore();
    }

    function loop(now) {
      if (!running) return;
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;
      elapsed += dt;

      gameSpeed = Math.min(BASE_SPEED + elapsed * SPEED_RAMP, MAX_SPEED);
      distance += gameSpeed * dt;
      const newScore = Math.floor(distance / 12);
      if (newScore !== score) {
        if (Math.floor(newScore / 50) !== Math.floor(score / 50)) sfx.tick();
        score = newScore;
      }

      if (jumping) {
        vy += GRAVITY * dt;
        airY -= vy * dt;
        if (airY <= 0) { airY = 0; jumping = false; vy = 0; }
      }

      bgFar += gameSpeed * 0.18 * dt;
      bgMid += gameSpeed * 0.42 * dt;
      bgGround += gameSpeed * dt;

      spawnInterval = Math.max(1.6 - elapsed * 0.009, MIN_SPAWN_INTERVAL);
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) { spawnTimer = 0; spawnObstacle(); }

      obstacles.forEach((o) => { o.x -= gameSpeed * dt; });
      obstacles = obstacles.filter((o) => o.x + o.w > -20);

      if (!jumping && Math.random() < 0.6) {
        const r = truckRect();
        particles.push({
          x: r.x + r.w * 0.2, y: r.y + r.h,
          vx: -gameSpeed * 0.5 - Math.random() * 40, vy: -Math.random() * 30,
          life: 0.4, maxLife: 0.4, size: 2 + Math.random() * 2,
        });
      }
      particles.forEach((p) => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 90 * dt; p.life -= dt; });
      particles = particles.filter((p) => p.life > 0);

      const t = Math.min(elapsed / 50, 1);
      ctx.clearRect(0, 0, width, height);
      drawSky(t);
      drawMountains(bgFar);
      drawSkyline(bgMid);
      drawGround(bgGround);
      particles.forEach(drawParticle);

      obstacles.forEach((o) => {
        if (o.type === 'cone') drawCone(o.x, groundY(), o.w, height * 0.16);
        else if (o.type === 'barrier') drawBarrier(o.x, groundY() - height * 0.13, o.w, height * 0.13);
        else {
          const standH = truckH();
          drawSign(o.x, o.w, groundY() - standH * 1.35, groundY() - standH * 0.62);
        }
      });

      const tr = truckRect();
      const bob = jumping ? 0 : Math.sin(distance * 0.04) * (height * 0.012);
      drawTruck(tr, distance * 0.05, bob);

      let hit = false;
      for (const o of obstacles) {
        if (rectsOverlap(tr, obstacleRect(o))) { hit = true; break; }
      }

      setHud({ score });

      if (flashT > 0) {
        flashT -= dt;
        ctx.fillStyle = `rgba(255,69,58,${Math.max(flashT, 0) * 0.85})`;
        ctx.fillRect(0, 0, width, height);
      }

      if (hit) {
        running = false;
        sfx.crash();
        onGameOver(score);
        return;
      }
      requestAnimationFrame(loop);
    }

    const rafId = requestAnimationFrame(loop);

    return () => {
      running = false;
      cancelAnimationFrame(rafId);
      ro.disconnect();
      window.removeEventListener('keydown', onKeyDown);
      window.removeEventListener('keyup', onKeyUp);
      canvas.removeEventListener('pointerdown', onPointerDown);
    };
  }, [driverImg]);

  return (
    <div style={{ position: 'relative', width: '100%', height: '100%' }}>
      <canvas ref={canvasRef} style={{ display: 'block', width: '100%', height: '100%', touchAction: 'none' }} />
      <div style={{ position: 'absolute', top: 12, right: 14, pointerEvents: 'none' }}>
        <span style={{
          fontFamily: 'var(--font-mono)', fontVariantNumeric: 'tabular-nums', fontWeight: 700, fontSize: 20,
          color: 'var(--gold-400)', textShadow: '0 2px 6px rgba(0,0,0,.7), 0 0 1px rgba(0,0,0,.9)',
        }}>{String(hud.score).padStart(5, '0')}</span>
      </div>
    </div>
  );
}

function GameSection({ onBuy }) {
  const [phase, setPhase] = React.useState('select'); // select | idle | playing | over
  const [driverId, setDriverId] = React.useState(GAME_DRIVERS[0].id);
  const [score, setScore] = React.useState(0);
  const [best, setBest] = React.useState(() => Number(localStorage.getItem(GAME_BEST_KEY) || 0));
  const [ready, setReady] = React.useState(false);
  const [shareState, setShareState] = React.useState('idle'); // idle | copied
  const imagesRef = React.useRef({});
  const ref = useReveal();

  React.useEffect(() => {
    let cancelled = false;
    gameLoadImages(GAME_DRIVERS.map((d) => d.img)).then((imgs) => {
      if (cancelled) return;
      GAME_DRIVERS.forEach((d, i) => { imagesRef.current[d.id] = imgs[i]; });
      setReady(true);
    });
    return () => { cancelled = true; };
  }, []);

  const handleOver = React.useCallback((finalScore) => {
    setScore(finalScore);
    setBest((prevBest) => {
      if (finalScore <= prevBest) return prevBest;
      try { localStorage.setItem(GAME_BEST_KEY, String(finalScore)); } catch {}
      return finalScore;
    });
    setPhase('over');
  }, []);

  const share = () => {
    const text = `Saqué ${score} puntos en el desafío Súbete y Gana. Juega tú también y participa por la Silverado Z71:`;
    const url = window.location.href;
    if (navigator.share) {
      navigator.share({ title: 'Súbete y Gana — el desafío', text, url }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(`${text} ${url}`).then(() => {
        setShareState('copied');
        setTimeout(() => setShareState('idle'), 2000);
      }).catch(() => {});
    }
  };

  const driver = GAME_DRIVERS.find((d) => d.id === driverId);

  return (

            background: 'var(--grad-gold)', WebkitBackgroundClip: 'text',
            WebkitTextFillColor: 'transparent', backgroundClip: 'text',
          }}>el desafío</span>
        </h2>
        <p style={{ fontSize: 'var(--fs-sm)', color: 'var(--silver-500)', maxWidth: 560, margin: '0 auto', lineHeight: 'var(--lh-body)' }}>
          Elige quién maneja la Silverado y salta los obstáculos del camino. Espacio / ↑ o toca la pantalla para saltar, ↓ para agacharte.
        </p>
      </div>

      <Card variant="premium" padding={false} style={{ maxWidth: 680, margin: '0 auto' }}>
        <div style={{ padding: 'var(--space-3)' }}>
          <div style={{
            position: 'relative', width: '100%', aspectRatio: '2.2 / 1', minHeight: 220,
            borderRadius: 'var(--radius-sm)', overflow: 'hidden', background: 'var(--bg-base)',
          }}>
            {phase === 'playing' && (
              <GameCanvas onGameOver={handleOver} driverImg={imagesRef.current[driverId]} />
            )}

            {phase !== 'playing' && (
              <div style={{
                position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', gap: 16, padding: 'var(--space-6)', textAlign: 'center',
              }}>
                {phase === 'select' && (
                  <>
                    <h3 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 'var(--fs-h3)', color: 'var(--silver-100)' }}>

                        return (

                            style={{

                            <span style={{

                              <img src={d.img} alt={d.full} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />

                  <>
                    <h3 style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 'var(--fs-h3)', color: 'var(--silver-100)' }}>
                      Choque en el camino
                    </h3>
                    <div style={{
                      fontFamily: 'var(--font-mono)', fontSize: '2.2rem', fontWeight: 700, lineHeight: 1,
                      fontVariantNumeric: 'tabular-nums', background: 'var(--grad-gold)',
                      WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text',
                    }}>{score}</div>
                    {score > 0 && score >= best && <Badge variant="success">Nuevo récord</Badge>}
                    <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center' }}>
                      <Button variant="primary" size="sm" onClick={() => setPhase('playing')}>Reintentar</Button>
                      <Button variant="secondary" size="sm" onClick={onBuy}>Participar ahora</Button>
                    </div>
                    <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap', justifyContent: 'center', alignItems: 'center' }}>
                      <Button variant="ghost" size="sm" onClick={() => setPhase('select')}>Cambiar conductor</Button>
                      <Button variant="ghost" size="sm" onClick={share}>
                        {shareState === 'copied' ? 'Enlace copiado' : 'Compartir puntaje'}

                    </div>
                    <div style={{ fontSize: 'var(--fs-xs)', color: 'var(--silver-700)' }}>Récord: {best}</div>
                  </>

      </Card>

  );

    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
  );
}

function ModalStepsSidebar({ current }) {
  return (
    <React.Fragment>
      {MODAL_STEPS.map((s,i) => {
        const done=i<current, active=i===current;
        return (
          <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <div style={{
              width:32,height:32,borderRadius:'50%',flexShrink:0,
              background:done||active?'var(--gold-500)':'var(--bg-base)',
              border:(!done&&!active)?'1.5px solid rgba(255,255,255,.12)':'none',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontWeight:700,fontSize:13,
              color:(done||active)?'#0A0A0B':'var(--silver-700)',
            }}>{done?'✓':i+1}</div>
            <div style={{paddingTop:3}}>
              <div className="step-label" style={{fontSize:13,fontWeight:600,lineHeight:1.3,color:active?'var(--silver-100)':done?'var(--silver-300)':'var(--silver-700)'}}>{s.label}</div>
              <div className="step-text" style={{fontSize:11,marginTop:2,color:active?'var(--silver-500)':'var(--silver-700)',lineHeight:1.4}}>{s.desc}</div>
            </div>
          </div>
        );
      })}
    </React.Fragment>
  );
}

/* ── Purchase Modal ── */
function PurchaseModal({ open, onClose }) {
  const [step,setStep]           = React.useState(0);
  const [qty,setQty]             = React.useState(10);
  const [userName,setUserName]   = React.useState('');
  const [email,setEmail]         = React.useState('');
  const [emailErr,setEmailErr]   = React.useState('');
  const [authLoading,setAuthLoading] = React.useState(false);
  const [payLoading,setPayLoading]   = React.useState(false);
  const [payMethod,setPayMethod]     = React.useState('webpay');
  const ticket = React.useMemo(()=>String(Math.floor(Math.random()*89999+10000)),[]);

  React.useEffect(()=>{
    if(!open){ setTimeout(()=>{ setStep(0);setQty(10);setEmail('');setEmailErr('');setUserName(''); },300); }
  },[open]);

  if (!open) return null;

  const isLoggedIn = !!userName;

  const handleContinueQty = () => isLoggedIn ? setStep(2) : setStep(1);

  const handleGoogleAuth = () => {
    setAuthLoading(true);
    setTimeout(()=>{ setAuthLoading(false); setUserName('Usuario de Google'); setStep(2); },1200);
  };

  const handleEmailAuth = () => {
    if(!email.includes('@')){ setEmailErr('Ingresa un correo válido'); return; }
    const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    setUserName(name); setStep(2);
  };

  const handlePay = () => {
    setPayLoading(true);
    setTimeout(()=>{ setPayLoading(false); setStep(3); },1800);
  };

  const payMethods = [
    {id:'webpay',label:'Webpay / Transbank',sub:'Débito, crédito y prepago'},
    {id:'flow',  label:'Flow',              sub:'Todos los medios de pago chilenos'},
    {id:'mepago',label:'MercadoPago',        sub:'Tarjetas y transferencias'},
  ];

  return (
    <div
      style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.75)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}
    >
      <div style={{background:'var(--bg-surface)',borderRadius:16,border:'1px solid rgba(255,255,255,.09)',boxShadow:'0 24px 80px rgba(0,0,0,.6)',width:'100%',maxWidth:720,maxHeight:'90vh',overflowY:'auto',position:'relative'}}>
        {/* Gold bar */}
        <div style={{height:3,background:'var(--grad-gold)',borderRadius:'16px 16px 0 0'}}/>

        {/* Close button */}
        <button onClick={onClose} style={{position:'absolute',top:16,right:16,width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.06)',border:'none',color:'var(--silver-400)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1}}>✕</button>

        <div className="modal-body">
          {/* Sidebar */}
          <div className="modal-sidebar">
            <ModalStepsSidebar current={step}/>
          </div>

          {/* Content */}
          <div className="modal-content">

            {/* Step 0: Quantity (always visible, no login required) */}
            {step===0 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:16}}>
                  Selecciona tus participaciones
                </h3>

                {/* Greeting if logged in */}
                {isLoggedIn && (
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'10px 14px',background:'var(--bg-elevated)',borderRadius:10,border:'1px solid rgba(255,255,255,.07)'}}>
                    <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(212,175,55,.12)',border:'1px solid rgba(212,175,55,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'var(--gold-400)',flexShrink:0}}>👤</div>
                    <div style={{fontSize:13,flex:1}}>
                      <span style={{color:'var(--silver-100)',fontWeight:600}}>Hola, {userName}</span>
                      <span style={{color:'var(--silver-600)'}}> · </span>
                      <span onClick={()=>setUserName('')} style={{color:'var(--gold-400)',cursor:'pointer',fontSize:12,textDecoration:'underline'}}>cerrar sesión</span>
                    </div>
                  </div>
                )}

                <div style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:10}}>Cantidad de participaciones:</div>

                {/* Preset chips */}
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
                  {PRESETS.map(n => {
                    const active=qty===n;
                    return (
                      <button key={n} onClick={()=>setQty(n)} style={{
                        height:38,minWidth:44,padding:'0 12px',borderRadius:8,
                        background:'transparent',
                        border:`1.5px solid ${active?'var(--gold-400)':'rgba(255,255,255,.1)'}`,
                        color:active?'var(--gold-400)':'var(--silver-300)',
                        fontWeight:600,fontSize:14,cursor:'pointer',
                        transition:'all .15s',fontFamily:'var(--font-body)',
                      }}>{n}</button>
                    );
                  })}
                </div>

                {/* Stepper + total */}
                <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:24}}>
                  <div style={{display:'flex',borderRadius:8,overflow:'hidden'}}>
                    <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:36,height:36,background:'var(--bg-elevated)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'8px 0 0 8px',color:'var(--silver-100)',fontSize:18,cursor:'pointer',fontFamily:'var(--font-body)'}}>−</button>
                    <div style={{width:48,height:36,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-elevated)',borderTop:'1px solid rgba(255,255,255,.12)',borderBottom:'1px solid rgba(255,255,255,.12)',color:'var(--silver-100)',fontWeight:700,fontSize:14,fontVariantNumeric:'tabular-nums'}}>{qty}</div>
                    <button onClick={()=>setQty(q=>q+1)} style={{width:36,height:36,background:'var(--bg-elevated)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'0 8px 8px 0',color:'var(--silver-100)',fontSize:18,cursor:'pointer',fontFamily:'var(--font-body)'}}>+</button>
                  </div>
                  <div>
                    <span style={{fontSize:13,color:'var(--silver-500)'}}>A pagar: </span>
                    <span style={{fontSize:'1.2rem',fontWeight:800,color:'var(--silver-100)',fontVariantNumeric:'tabular-nums'}}>${(qty*3000).toLocaleString('es-CL')}</span>
                  </div>
                </div>

                <button onClick={handleContinueQty} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:'var(--fs-body)',cursor:'pointer',fontFamily:'var(--font-body)',transition:'filter .15s'}}>
                  Continuar →
                </button>
              </div>
            )}

            {/* Step 1: Auth */}
            {step===1 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:6}}>Inicia sesión</h3>
                <p style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:20,lineHeight:1.5}}>Confirma tu identidad para reservar tu número.</p>

                {/* Google */}
                <button onClick={handleGoogleAuth} disabled={authLoading} style={{width:'100%',height:46,borderRadius:10,background:'#fff',border:'1px solid #dadce0',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontSize:14,fontWeight:600,color:'#1f1f1f',marginBottom:16,cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.12)',fontFamily:'var(--font-body)',opacity:authLoading?.7:1}}>
                  {authLoading ? <span style={{color:'#5f6368'}}>Conectando…</span> : <><GoogleLogo/><span>Continuar con Google</span></>}
                </button>

                {/* Divider */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                  <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
                  <span style={{fontSize:11,color:'var(--silver-700)',fontWeight:500}}>o continúa con tu correo</span>
                  <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
                </div>

                {/* Email */}
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--silver-500)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Correo electrónico</label>
                <input
                  type="email" placeholder="tu@correo.cl" value={email}
                  onChange={e=>{setEmail(e.target.value);setEmailErr('');}}
                  onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
                  style={{width:'100%',height:42,borderRadius:8,background:'var(--bg-elevated)',border:`1.5px solid ${emailErr?'var(--danger)':'rgba(255,255,255,.1)'}`,color:'var(--silver-100)',fontSize:14,padding:'0 14px',outline:'none',fontFamily:'var(--font-body)',marginBottom:emailErr?6:14}}
                />
                {emailErr && <p style={{fontSize:12,color:'var(--danger)',marginBottom:10}}>{emailErr}</p>}

                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={handleEmailAuth} disabled={authLoading} style={{width:'100%',height:46,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)'}}>Verificar correo →</button>
                  <button onClick={()=>setStep(0)} style={{width:'100%',height:40,borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,.1)',color:'var(--silver-500)',fontSize:13,cursor:'pointer',fontFamily:'var(--font-body)'}}>Volver</button>
                </div>
              </div>
            )}

            {/* Step 2: Payment */}
            {step===2 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:8}}>Método de pago</h3>
                <p style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:16}}>Pago 100% seguro, procesado en Chile.</p>

                {/* Summary */}
                <div style={{background:'var(--bg-elevated)',borderRadius:10,border:'1px solid rgba(255,255,255,.07)',padding:14,marginBottom:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{color:'var(--silver-500)',fontSize:13}}>Participaciones</span>
                    <span style={{color:'var(--silver-100)',fontWeight:600}}>{qty}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{color:'var(--silver-500)',fontSize:13}}>Precio unitario</span>
                    <span style={{color:'var(--silver-100)',fontWeight:600}}>$3.000</span>
                  </div>
                  <div style={{height:1,background:'rgba(255,255,255,.07)',margin:'8px 0'}}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{color:'var(--silver-100)',fontWeight:700}}>Total</span>
                    <span style={{fontSize:'1.1rem',fontWeight:800,color:'var(--silver-100)',fontVariantNumeric:'tabular-nums'}}>${(qty*3000).toLocaleString('es-CL')}</span>
                  </div>
                </div>

                {/* Pay methods */}
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {payMethods.map(m=>(
                    <div key={m.id} onClick={()=>setPayMethod(m.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,border:`1.5px solid ${payMethod===m.id?'var(--gold-500)':'rgba(255,255,255,.08)'}`,background:payMethod===m.id?'rgba(212,175,55,.07)':'var(--bg-elevated)',cursor:'pointer',transition:'all .18s'}}>
                      <div style={{width:16,height:16,borderRadius:'50%',flexShrink:0,border:`2px solid ${payMethod===m.id?'var(--gold-500)':'rgba(255,255,255,.2)'}`,background:payMethod===m.id?'var(--gold-500)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {payMethod===m.id&&<div style={{width:5,height:5,borderRadius:'50%',background:'#0A0A0B'}}/>}
                      </div>
                      <div>
                        <div style={{fontWeight:600,color:'var(--silver-100)',fontSize:13}}>{m.label}</div>
                        <div style={{fontSize:11,color:'var(--silver-500)',marginTop:1}}>{m.sub}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={handlePay} disabled={payLoading} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)',opacity:payLoading?.7:1}}>
                    {payLoading?'Procesando…':`Pagar $${(qty*3000).toLocaleString('es-CL')} →`}
                  </button>
                  <button onClick={()=>setStep(isLoggedIn?0:1)} disabled={payLoading} style={{width:'100%',height:40,borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,.1)',color:'var(--silver-500)',fontSize:13,cursor:'pointer',fontFamily:'var(--font-body)'}}>Volver</button>
                </div>
              </div>
            )}

            {/* Step 3: Confirmation */}
            {step===3 && (
              <div style={{textAlign:'center',paddingTop:8}}>
                <div style={{position:'relative',width:110,height:110,margin:'0 auto 12px'}}>
                  <div style={{position:'absolute',inset:'-30%',background:'radial-gradient(circle, rgba(245,200,66,.35) 0%, transparent 70%)',filter:'blur(10px)'}}/>
                  <img src="../../assets/atmosphere/golden-ticket.webp" alt="" aria-hidden="true" style={{position:'relative',width:'100%',height:'100%',objectFit:'contain',filter:'drop-shadow(0 8px 20px rgba(0,0,0,.5))'}}/>
                </div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:8}}>¡Ya estás participando!</h3>
                <p style={{fontSize:13,color:'var(--silver-500)',marginBottom:20,lineHeight:1.6}}>Pago procesado exitosamente. Recibirás confirmación por correo.</p>
                <div style={{background:'var(--bg-elevated)',borderRadius:12,border:'1px solid rgba(212,175,55,.2)',padding:18,marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--silver-500)',marginBottom:8}}>Tu número de participación</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:'2.4rem',fontWeight:700,letterSpacing:'.04em',lineHeight:1,background:'var(--grad-gold)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',marginBottom:6}}>#{ticket}</div>
                  <div style={{fontSize:11,color:'var(--silver-700)'}}>{qty} participaci{qty===1?'ón':'ones'} · ${(qty*3000).toLocaleString('es-CL')} CLP</div>
                </div>
                <button onClick={onClose} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)'}}>Cerrar</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App root ── */
function App() {
  const [modalOpen, setModalOpen] = React.useState(false);
  const [lightbox, setLightbox] = React.useState(null);
  return (
    <>
      <Header onBuy={()=>setModalOpen(true)}/>
      <main>
        <Hero onBuy={()=>setModalOpen(true)}/>
        <HowItWorks/>
        <TicketDivider/>
        <ParticipationSection onBuy={()=>setModalOpen(true)}/>
        <PrizeSection/>
        <TicketDivider/>
        <GallerySection onOpen={setLightbox}/>
        <WallpapersSection/>
        <GameSection onBuy={()=>setModalOpen(true)}/>
        <TicketDivider/>
        <TrustSection/>
      </main>
      <Footer/>
      <PurchaseModal open={modalOpen} onClose={()=>setModalOpen(false)}/>
      <Lightbox src={lightbox} onClose={()=>setLightbox(null)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
