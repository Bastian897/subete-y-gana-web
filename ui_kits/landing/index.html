/* ── Confetti ── */
function Confetti() {
  const pieces = React.useMemo(() => Array.from({length: 22}, (_, i) => ({
    id: i,
    left: Math.random() * 100,
    delay: Math.random() * 6,
    dur: 5 + Math.random() * 5,
    color: ['#F5C842','#D4AF37','#FFF1B8','#FFFFFF','#B8860B','#FFE9A8'][Math.floor(Math.random()*6)],
    size: 5 + Math.random() * 6,
  })), []);

  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:1}}>
      {pieces.map(p => (
        <div key={p.id} className="confetti-piece" style={{
          left:`${p.left}%`,
          top:'-10px',
          width:p.size,
          height:p.size,
          background:p.color,
          animationDuration:`${p.dur}s`,
          animationDelay:`${p.delay}s`,
          borderRadius: Math.random() > 0.5 ? '50%' : '2px',
        }}/>
      ))}
    </div>
  );
}

    { q:'¿Cuándo me llega mi número de participación?', a:'Tu número se asigna automáticamente al confirmar el pago. También te llega por correo (puede tardar unos minutos).' },
    { q:'¿Qué métodos de pago aceptan?', a:'Aceptamos Webpay, Flow y MercadoPago. Todos los pagos son procesados de forma segura.' },
    { q:'¿Puedo comprar más de una participación?', a:'Sí, puedes comprar hasta 500 participaciones en una sola transacción para maximizar tus chances.' },
  ];

  return (
    <section style={{padding:'var(--space-24) var(--space-8)',maxWidth:860,margin:'0 auto'}}>
      {/* Trust badges */}
      <div style={{
        display:'flex',gap:'var(--space-4)',justifyContent:'center',
        flexWrap:'wrap',marginBottom:'var(--space-16)',
      }}>
        {['Sorteo ante notario','Pago 100% seguro','Transmisión en vivo','Número único garantizado'].map(b => (
          <Badge key={b} variant="trust">{b}</Badge>
        ))}
      </div>

      {/* FAQ */}
      <div style={{textAlign:'center',marginBottom:'var(--space-8)'}}>
        <h2 style={{
          fontFamily:'var(--font-display)',fontSize:'var(--fs-h2)',fontWeight:800,
          color:'var(--silver-100)',
        }}>Preguntas frecuentes</h2>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'var(--space-3)'}}>
        {faqs.map((f,i) => (
          <div key={i} style={{
            background:'var(--bg-elevated)',
            border:'1px solid rgba(255,255,255,.06)',
            borderRadius:'var(--radius-md)',
            overflow:'hidden',
            cursor:'pointer',
          }} onClick={()=>setOpenFaq(openFaq===i?null:i)}>
            <div style={{
              padding:'var(--space-4) var(--space-6)',
              display:'flex',justifyContent:'space-between',alignItems:'center',
              fontWeight:600,color:'var(--silver-100)',fontSize:'var(--fs-sm)',
            }}>
              {f.q}
              <span style={{
                color:'var(--gold-500)',fontSize:'1.2rem',fontWeight:300,
                transform:openFaq===i?'rotate(45deg)':'none',
                transition:'transform .2s',flexShrink:0,marginLeft:12,
              }}>+</span>
            </div>
            {openFaq===i && (
              <div style={{
                padding:'0 var(--space-6) var(--space-4)',
                fontSize:'var(--fs-sm)',color:'var(--silver-500)',lineHeight:'var(--lh-body)',
                borderTop:'1px solid rgba(255,255,255,.04)',
              }}>{f.a}</div>
            )}
          </div>
        ))}
      </div>
    </section>
  );
}

/* ── Footer ── */
function Footer() {
  return (
    <footer style={{
      borderTop:'1px solid rgba(255,255,255,.06)',
      padding:'var(--space-8)',
      textAlign:'center',
    }}>
      <img src="../../assets/logo.jpg" alt="Súbete y Gana" style={{height:40,width:40,objectFit:'contain',borderRadius:6,marginBottom:'var(--space-4)'}}/>
      <div style={{
        display:'flex',gap:'var(--space-6)',justifyContent:'center',flexWrap:'wrap',
        fontSize:'var(--fs-xs)',marginBottom:'var(--space-4)',
      }}>
        {['Bases legales','Términos y condiciones','Política de privacidad','Contacto'].map(l=>(
          <a key={l} href="#" style={{color:'var(--silver-700)',textDecoration:'none'}}>{l}</a>
        ))}
      </div>
      <div style={{fontSize:'var(--fs-xs)',color:'var(--silver-700)'}}>
        © 2025 Súbete y Gana · Sorteo sujeto a bases legales · Chile
      </div>

}

/* ── Purchase Modal helpers ── */
const PRESETS = [5,10,25,50,100];

const MODAL_STEPS = [
  { label:'Decide la cantidad', desc:'Cuántas participaciones quieres' },
  { label:'Inicia sesión',      desc:'Verificaremos tu correo'         },
  { label:'Pagar con tarjeta',  desc:'Efectúa el pago'                 },
  { label:'Confirmación',       desc:'¡Proceso completado!'            },
];

function GoogleLogo() {
  return (
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
  );
}

function ModalStepsSidebar({ current }) {
  return (
    <div style={{display:'flex',flexDirection:'column',gap:24,width:180,flexShrink:0}}>
      {MODAL_STEPS.map((s,i) => {
        const done=i<current, active=i===current;
        return (
          <div key={i} style={{display:'flex',gap:12,alignItems:'flex-start'}}>
            <div style={{
              width:32,height:32,borderRadius:'50%',flexShrink:0,
              background:done||active?'var(--gold-500)':'var(--bg-base)',
              border:(!done&&!active)?'1.5px solid rgba(255,255,255,.12)':'none',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontWeight:700,fontSize:13,
              color:(done||active)?'#0A0A0B':'var(--silver-700)',
            }}>{done?'✓':i+1}</div>
            <div style={{paddingTop:3}}>
              <div style={{fontSize:13,fontWeight:600,lineHeight:1.3,color:active?'var(--silver-100)':done?'var(--silver-300)':'var(--silver-700)'}}>{s.label}</div>
              <div style={{fontSize:11,marginTop:2,color:active?'var(--silver-500)':'var(--silver-700)',lineHeight:1.4}}>{s.desc}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── Purchase Modal ── */
function PurchaseModal({ open, onClose }) {
  const [step,setStep]           = React.useState(0);
  const [qty,setQty]             = React.useState(10);
  const [userName,setUserName]   = React.useState('');
  const [email,setEmail]         = React.useState('');
  const [emailErr,setEmailErr]   = React.useState('');
  const [authLoading,setAuthLoading] = React.useState(false);
  const [payLoading,setPayLoading]   = React.useState(false);
  const [payMethod,setPayMethod]     = React.useState('webpay');
  const ticket = React.useMemo(()=>String(Math.floor(Math.random()*89999+10000)),[]);

  React.useEffect(()=>{
    if(!open){ setTimeout(()=>{ setStep(0);setQty(10);setEmail('');setEmailErr('');setUserName(''); },300); }
  },[open]);

  if (!open) return null;

  const isLoggedIn = !!userName;

  const handleContinueQty = () => isLoggedIn ? setStep(2) : setStep(1);

  const handleGoogleAuth = () => {
    setAuthLoading(true);
    setTimeout(()=>{ setAuthLoading(false); setUserName('Usuario de Google'); setStep(2); },1200);
  };

  const handleEmailAuth = () => {
    if(!email.includes('@')){ setEmailErr('Ingresa un correo válido'); return; }
    const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
    setUserName(name); setStep(2);
  };

  const handlePay = () => {
    setPayLoading(true);
    setTimeout(()=>{ setPayLoading(false); setStep(3); },1800);
  };

  const payMethods = [
    {id:'webpay',label:'Webpay / Transbank',sub:'Débito, crédito y prepago'},
    {id:'flow',  label:'Flow',              sub:'Todos los medios de pago chilenos'},
    {id:'mepago',label:'MercadoPago',        sub:'Tarjetas y transferencias'},
  ];

  return (
    <div
      style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.75)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}
      onClick={e=>e.target===e.currentTarget&&onClose()}
    >
      <div style={{background:'var(--bg-surface)',borderRadius:16,border:'1px solid rgba(255,255,255,.09)',boxShadow:'0 24px 80px rgba(0,0,0,.6)',width:'100%',maxWidth:720,maxHeight:'90vh',overflowY:'auto',position:'relative'}}>
        {/* Gold bar */}
        <div style={{height:3,background:'var(--grad-gold)',borderRadius:'16px 16px 0 0'}}/>

        {/* Close button */}
        <button onClick={onClose} style={{position:'absolute',top:16,right:16,width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,.06)',border:'none',color:'var(--silver-400)',fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1}}>✕</button>

        <div style={{display:'flex',gap:0}}>
          {/* Sidebar */}
          <div style={{padding:'28px 24px',borderRight:'1px solid rgba(255,255,255,.06)',display:'flex',flexDirection:'column',justifyContent:'center'}}>
            <ModalStepsSidebar current={step}/>
          </div>

          {/* Content */}
          <div style={{flex:1,padding:'28px 28px 32px'}}>

            {/* Step 0: Quantity (always visible, no login required) */}
            {step===0 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:16}}>
                  Selecciona tus participaciones
                </h3>

                {/* Greeting if logged in */}
                {isLoggedIn && (
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'10px 14px',background:'var(--bg-elevated)',borderRadius:10,border:'1px solid rgba(255,255,255,.07)'}}>
                    <div style={{width:32,height:32,borderRadius:'50%',background:'rgba(212,175,55,.12)',border:'1px solid rgba(212,175,55,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'var(--gold-400)',flexShrink:0}}>👤</div>
                    <div style={{fontSize:13,flex:1}}>
                      <span style={{color:'var(--silver-100)',fontWeight:600}}>Hola, {userName}</span>
                      <span style={{color:'var(--silver-600)'}}> · </span>
                      <span onClick={()=>setUserName('')} style={{color:'var(--gold-400)',cursor:'pointer',fontSize:12,textDecoration:'underline'}}>cerrar sesión</span>
                    </div>
                  </div>
                )}

                <div style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:10}}>Cantidad de participaciones:</div>

                {/* Preset chips */}
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
                  {PRESETS.map(n => {
                    const active=qty===n;
                    return (
                      <button key={n} onClick={()=>setQty(n)} style={{
                        height:38,minWidth:44,padding:'0 12px',borderRadius:8,
                        background:'transparent',
                        border:`1.5px solid ${active?'var(--gold-400)':'rgba(255,255,255,.1)'}`,
                        color:active?'var(--gold-400)':'var(--silver-300)',
                        fontWeight:600,fontSize:14,cursor:'pointer',
                        transition:'all .15s',fontFamily:'var(--font-body)',
                      }}>{n}</button>
                    );
                  })}
                </div>

                {/* Stepper + total */}
                <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:24}}>
                  <div style={{display:'flex',borderRadius:8,overflow:'hidden'}}>
                    <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:36,height:36,background:'var(--bg-elevated)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'8px 0 0 8px',color:'var(--silver-100)',fontSize:18,cursor:'pointer',fontFamily:'var(--font-body)'}}>−</button>
                    <div style={{width:48,height:36,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-elevated)',borderTop:'1px solid rgba(255,255,255,.12)',borderBottom:'1px solid rgba(255,255,255,.12)',color:'var(--silver-100)',fontWeight:700,fontSize:14,fontVariantNumeric:'tabular-nums'}}>{qty}</div>
                    <button onClick={()=>setQty(q=>q+1)} style={{width:36,height:36,background:'var(--bg-elevated)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'0 8px 8px 0',color:'var(--silver-100)',fontSize:18,cursor:'pointer',fontFamily:'var(--font-body)'}}>+</button>
                  </div>
                  <div>
                    <span style={{fontSize:13,color:'var(--silver-500)'}}>A pagar: </span>
                    <span style={{fontSize:'1.2rem',fontWeight:800,color:'var(--silver-100)',fontVariantNumeric:'tabular-nums'}}>${(qty*3000).toLocaleString('es-CL')}</span>
                  </div>
                </div>

                <button onClick={handleContinueQty} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:'var(--fs-body)',cursor:'pointer',fontFamily:'var(--font-body)',transition:'filter .15s'}}>
                  Continuar →
                </button>
              </div>
            )}

            {/* Step 1: Auth */}
            {step===1 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:6}}>Inicia sesión</h3>
                <p style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:20,lineHeight:1.5}}>Confirma tu identidad para reservar tu número.</p>

                {/* Google */}
                <button onClick={handleGoogleAuth} disabled={authLoading} style={{width:'100%',height:46,borderRadius:10,background:'#fff',border:'1px solid #dadce0',display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontSize:14,fontWeight:600,color:'#1f1f1f',marginBottom:16,cursor:'pointer',boxShadow:'0 1px 3px rgba(0,0,0,.12)',fontFamily:'var(--font-body)',opacity:authLoading?.7:1}}>
                  {authLoading ? <span style={{color:'#5f6368'}}>Conectando…</span> : <><GoogleLogo/><span>Continuar con Google</span></>}
                </button>

                {/* Divider */}
                <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
                  <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
                  <span style={{fontSize:11,color:'var(--silver-700)',fontWeight:500}}>o continúa con tu correo</span>
                  <div style={{flex:1,height:1,background:'rgba(255,255,255,.08)'}}/>
                </div>

                {/* Email */}
                <label style={{display:'block',fontSize:11,fontWeight:600,color:'var(--silver-500)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Correo electrónico</label>
                <input
                  type="email" placeholder="tu@correo.cl" value={email}
                  onChange={e=>{setEmail(e.target.value);setEmailErr('');}}
                  onKeyDown={e=>e.key==='Enter'&&handleEmailAuth()}
                  style={{width:'100%',height:42,borderRadius:8,background:'var(--bg-elevated)',border:`1.5px solid ${emailErr?'var(--danger)':'rgba(255,255,255,.1)'}`,color:'var(--silver-100)',fontSize:14,padding:'0 14px',outline:'none',fontFamily:'var(--font-body)',marginBottom:emailErr?6:14}}
                />
                {emailErr && <p style={{fontSize:12,color:'var(--danger)',marginBottom:10}}>{emailErr}</p>}

                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={handleEmailAuth} disabled={authLoading} style={{width:'100%',height:46,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)'}}>Verificar correo →</button>
                  <button onClick={()=>setStep(0)} style={{width:'100%',height:40,borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,.1)',color:'var(--silver-500)',fontSize:13,cursor:'pointer',fontFamily:'var(--font-body)'}}>Volver</button>
                </div>
              </div>
            )}

            {/* Step 2: Payment */}
            {step===2 && (
              <div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:8}}>Método de pago</h3>
                <p style={{fontSize:'var(--fs-sm)',color:'var(--silver-500)',marginBottom:16}}>Pago 100% seguro, procesado en Chile.</p>

                {/* Summary */}
                <div style={{background:'var(--bg-elevated)',borderRadius:10,border:'1px solid rgba(255,255,255,.07)',padding:14,marginBottom:16}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{color:'var(--silver-500)',fontSize:13}}>Participaciones</span>
                    <span style={{color:'var(--silver-100)',fontWeight:600}}>{qty}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{color:'var(--silver-500)',fontSize:13}}>Precio unitario</span>
                    <span style={{color:'var(--silver-100)',fontWeight:600}}>$3.000</span>
                  </div>
                  <div style={{height:1,background:'rgba(255,255,255,.07)',margin:'8px 0'}}/>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <span style={{color:'var(--silver-100)',fontWeight:700}}>Total</span>
                    <span style={{fontSize:'1.1rem',fontWeight:800,color:'var(--silver-100)',fontVariantNumeric:'tabular-nums'}}>${(qty*3000).toLocaleString('es-CL')}</span>
                  </div>
                </div>

                {/* Pay methods */}
                <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
                  {payMethods.map(m=>(
                    <div key={m.id} onClick={()=>setPayMethod(m.id)} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 14px',borderRadius:10,border:`1.5px solid ${payMethod===m.id?'var(--gold-500)':'rgba(255,255,255,.08)'}`,background:payMethod===m.id?'rgba(212,175,55,.07)':'var(--bg-elevated)',cursor:'pointer',transition:'all .18s'}}>
                      <div style={{width:16,height:16,borderRadius:'50%',flexShrink:0,border:`2px solid ${payMethod===m.id?'var(--gold-500)':'rgba(255,255,255,.2)'}`,background:payMethod===m.id?'var(--gold-500)':'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                        {payMethod===m.id&&<div style={{width:5,height:5,borderRadius:'50%',background:'#0A0A0B'}}/>}
                      </div>
                      <div>
                        <div style={{fontWeight:600,color:'var(--silver-100)',fontSize:13}}>{m.label}</div>
                        <div style={{fontSize:11,color:'var(--silver-500)',marginTop:1}}>{m.sub}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  <button onClick={handlePay} disabled={payLoading} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)',opacity:payLoading?.7:1}}>
                    {payLoading?'Procesando…':`Pagar $${(qty*3000).toLocaleString('es-CL')} →`}
                  </button>
                  <button onClick={()=>setStep(isLoggedIn?0:1)} disabled={payLoading} style={{width:'100%',height:40,borderRadius:8,background:'transparent',border:'1px solid rgba(255,255,255,.1)',color:'var(--silver-500)',fontSize:13,cursor:'pointer',fontFamily:'var(--font-body)'}}>Volver</button>
                </div>
              </div>
            )}

            {/* Step 3: Confirmation */}
            {step===3 && (
              <div style={{textAlign:'center',paddingTop:8}}>
                <div style={{width:64,height:64,borderRadius:'50%',background:'rgba(52,199,89,.12)',border:'2px solid var(--success)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:'1.6rem',color:'var(--success)'}}>✓</div>
                <h3 style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:'var(--fs-h3)',color:'var(--silver-100)',marginBottom:8}}>¡Ya estás participando!</h3>
                <p style={{fontSize:13,color:'var(--silver-500)',marginBottom:20,lineHeight:1.6}}>Pago procesado exitosamente. Recibirás confirmación por correo.</p>
                <div style={{background:'var(--bg-elevated)',borderRadius:12,border:'1px solid rgba(212,175,55,.2)',padding:18,marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--silver-500)',marginBottom:8}}>Tu número de participación</div>
                  <div style={{fontFamily:'var(--font-mono)',fontSize:'2.4rem',fontWeight:700,letterSpacing:'.04em',lineHeight:1,background:'var(--grad-gold)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text',marginBottom:6}}>#{ticket}</div>
                  <div style={{fontSize:11,color:'var(--silver-700)'}}>{qty} participaci{qty===1?'ón':'ones'} · ${(qty*3000).toLocaleString('es-CL')} CLP</div>
                </div>
                <button onClick={onClose} style={{width:'100%',height:48,borderRadius:10,border:'none',background:'var(--gold-400)',color:'#0A0A0B',fontWeight:700,fontSize:14,cursor:'pointer',fontFamily:'var(--font-body)'}}>Cerrar</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App root ── */
function App() {
  const [modalOpen, setModalOpen] = React.useState(false);
  return (
    <>
      <Header onBuy={()=>setModalOpen(true)}/>
      <main>
        <Hero onBuy={()=>setModalOpen(true)}/>
        <HowItWorks/>
        <ParticipationSection onBuy={()=>setModalOpen(true)}/>
        <PrizeSection/>
        <WallpapersSection/>
        <TrustSection/>
      </main>
      <Footer/>
      <PurchaseModal open={modalOpen} onClose={()=>setModalOpen(false)}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
