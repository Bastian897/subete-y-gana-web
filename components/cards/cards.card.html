<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">

<style>
  body { background: var(--bg-base); padding: 20px; }

  .card-title { font-weight: 600; font-size: var(--fs-sm); color: var(--silver-100); margin-bottom: 4px; }
  .card-body  { font-size: var(--fs-xs); color: var(--silver-500); line-height: 1.5; }
  .tag { font-size: 9px; font-weight: 600; letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--silver-700); margin-bottom: 10px; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { Card } = window.SBeteYGanaDesignSystem_9297b8;
function App() {
  return (
    <div className="grid">
      <div>
        <div className="tag">Default</div>
        <Card variant="default">
          <div className="card-title">Cómo participar</div>
          <div className="card-body">Compra un fondo de pantalla y obtén tu número único de participación.</div>

      </div>
      <div>

    </div>
