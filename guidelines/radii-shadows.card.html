<!-- @dsCard group="Spacing" viewport="700x240" name="Radii & Shadows" subtitle="Bordes redondeados y sistema de sombras" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 24px 20px; }
  .section { display: flex; gap: 12px; margin-bottom: 20px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--silver-500); margin-top: 8px; text-align: center; }
  .token { font-family: var(--font-mono); font-size: 9px; color: var(--silver-700); text-align: center; }
  .box { background: var(--bg-elevated); border: 1px solid rgba(255,255,255,.08); width: 80px; height: 52px; display: flex; align-items: center; justify-content: center; }
  .shadow-box { width: 100px; height: 52px; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; border-radius: var(--radius-md); }
  .s-label { font-family: var(--font-mono); font-size: 9px; color: var(--silver-500); }
  .divider { font-size: 10px; font-weight: 600; color: var(--silver-700); letter-spacing: var(--ls-caps); text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
  <div class="divider">Border Radii</div>
  <div class="section">
    <div><div class="box" style="border-radius:var(--radius-sm)"></div><div class="label">sm</div><div class="token">8px</div></div>
    <div><div class="box" style="border-radius:var(--radius-md)"></div><div class="label">md</div><div class="token">14px</div></div>
    <div><div class="box" style="border-radius:var(--radius-lg)"></div><div class="label">lg</div><div class="token">22px</div></div>
    <div><div class="box" style="border-radius:var(--radius-pill);width:120px"></div><div class="label">pill</div><div class="token">999px</div></div>
  </div>
  <div class="divider">Shadows</div>
  <div class="section">
    <div><div class="shadow-box" style="box-shadow:var(--shadow-card)"><span class="s-label">card</span></div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-gold)"><span class="s-label">gold</span></div></div>
    <div><div class="shadow-box" style="box-shadow:var(--shadow-inset-metal);background:var(--grad-gold)"><span class="s-label" style="color:rgba(0,0,0,.6)">inset-metal</span></div></div>
  </div>
</body>
</html>
