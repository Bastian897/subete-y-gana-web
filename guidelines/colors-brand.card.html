<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 8px; align-items: flex-end; }
  .swatch { flex: 1; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 6px 6px; }
  .swatch-label { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,.7); line-height: 1.3; }
  .swatch-name  { font-size: 11px; font-weight: 600; color: var(--silver-500); margin-top: 6px; }
</style>
</head>
<body>
<div class="row">
  <div>
    <div class="swatch" style="background:var(--gold-50);height:60px;"><div class="swatch-label">#FFF8E1</div></div>
    <div class="swatch-name">50</div>
  </div>
  <div>
    <div class="swatch" style="background:var(--gold-200);height:70px;"><div class="swatch-label">#FFE9A8</div></div>
    <div class="swatch-name">200</div>
  </div>
  <div>
    <div class="swatch" style="background:var(--gold-400);height:90px;"><div class="swatch-label">#F5C842</div></div>
    <div class="swatch-name">400</div>
  </div>
  <div>
    <div class="swatch" style="background:var(--gold-500);height:110px;"><div class="swatch-label">#D4AF37</div></div>
    <div class="swatch-name">500 ★</div>
  </div>
  <div>
    <div class="swatch" style="background:var(--gold-600);height:90px;"><div class="swatch-label" style="color:rgba(255,255,255,.7)">#B8860B</div></div>
    <div class="swatch-name">600</div>
  </div>
  <div>
    <div class="swatch" style="background:var(--gold-700);height:70px;"><div class="swatch-label" style="color:rgba(255,255,255,.7)">#8A6608</div></div>
    <div class="swatch-name">700</div>
  </div>
</div>
</body>
</html>
