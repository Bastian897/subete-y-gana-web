<!-- @dsCard group="Type" viewport="700x300" name="Display & Headlines" subtitle="Poppins ExtraBold — hero y títulos" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .specimen { font-family: var(--font-display); font-weight: 800; line-height: var(--lh-display); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--silver-700); white-space: nowrap; flex-shrink: 0; }
  .divider { height: 1px; background: rgba(255,255,255,.06); }
</style>
</head>
<body>
  <div class="row">
    <div class="specimen text-gold" style="font-size:var(--fs-display)">Gana</div>
    <div class="meta">--fs-display · clamp(2.75–5.5rem) · 800</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="specimen" style="font-size:var(--fs-h1);color:var(--silver-100)">Chevrolet Silverado Z71</div>
    <div class="meta">--fs-h1 · clamp(2–3.25rem) · 800</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="specimen" style="font-size:var(--fs-h2);color:var(--silver-300)">Cómo participar</div>
    <div class="meta">--fs-h2 · clamp(1.5–2.25rem) · 700</div>
  </div>
  <div class="divider"></div>
  <div class="row">
    <div class="specimen" style="font-size:var(--fs-h3);color:var(--silver-300)">El premio en detalle</div>
    <div class="meta">--fs-h3 · 1.25rem · 700</div>
  </div>
</body>
</html>
