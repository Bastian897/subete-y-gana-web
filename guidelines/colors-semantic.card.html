<!-- @dsCard group="Colors" viewport="700x160" name="Semantic Colors" subtitle="Success · Warning · Danger · Info" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--bg-base); padding: 20px; }
  .row { display: flex; gap: 12px; }
  .chip { flex: 1; background: var(--bg-elevated); border-radius: var(--radius-md); padding: 16px 12px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .dot { width: 32px; height: 32px; border-radius: 50%; }
  .label { font-size: 12px; font-weight: 600; color: var(--silver-100); letter-spacing: var(--ls-caps); text-transform: uppercase; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--silver-500); }
</style>
</head>
<body>
<div class="row">
  <div class="chip">
    <div class="dot" style="background:var(--success)"></div>
    <div class="label">Success</div>
    <div class="hex">#34C759</div>
  </div>
  <div class="chip">
    <div class="dot" style="background:var(--warning)"></div>
    <div class="label">Warning</div>
    <div class="hex">#FFB020</div>
  </div>
  <div class="chip">
    <div class="dot" style="background:var(--danger)"></div>
    <div class="label">Danger</div>
    <div class="hex">#FF453A</div>
  </div>
  <div class="chip">
    <div class="dot" style="background:var(--info)"></div>
    <div class="label">Info</div>
    <div class="hex">#4DA3FF</div>
  </div>
</div>
</body>
</html>
